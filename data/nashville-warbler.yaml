name: Nashville Warbler
section: Warblers
identification: "Small warbler with a sharper beak and shorter-tailed compared to other warblers. Grey head, white eyering, yellow and olive underneath with yellow under the throat and greenish wings. Females are slightly muted/washed out in colouring from the males but still have the same features."
song: "Loud chipping song broken up into two parts."
cheats: "Sharp pointy beak and short tail."
