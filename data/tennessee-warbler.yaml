name: Tennessee Warbler
section: Warblers
identification: "Small greenish warbler with white under their tail. Breeding males have a lime green back, pale blue grey head, and whitish belly and under chin. Females, non-breeding and immatures are more subdued and generally yellow overall. Thin dark line through the eye with a light eyebrow. "
song: "Very loud song with a three part series of accelerating chirps."
cheats: "Strong cut-crease game (ask Chickadee what this means)"
