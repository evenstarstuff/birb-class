name: Olive Warbler
section: Warblers
identification: "Males have an orange head with dark cheeks. Grey body with prominent white wingbars. Females are not quite as vibrant as the males and have a yellow head with grey cheeks. "
song: "A distinctive “peew” call. They also have a musical song with repeated phrases which can either be clear or a little rough sounding."
cheats: "Less olive than the Arctic Warbler, so that's weird. Maybe they eat olives?"
