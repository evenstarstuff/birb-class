name: Arctic Warbler
section: Warblers
identification: "Dull olive-brown warbler. Prominent yellowish-white eyestripe. Faint wingbars and pale whitish underparts. "
song: "Electric chattery trill is most notable. Sounds similar to a Wilson’s Warbler and Orange-crowned Warbler. Also makes a metallic two-noted call and a short harsh buzz."
