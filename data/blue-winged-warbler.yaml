name: Blue-winged Warbler
section: Warblers
identification: "Yellow overall with a black line from the beak past the eye. Blue-grey wings with two whitish wingbars. They have a sharply pointed beak. Female looks very similar with slightly subdued colours. "
song: "Two note buzzy song which sounds very insect-like."
cheats: "Not actually very blue, but does have on-point winged eyeliner."
