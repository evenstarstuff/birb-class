name: Golden-winged Warbler
section: Warblers
identification: "Black and white pattern on their face with a yellow crown and distinct yellow patch on wing. The female is a subdued version of the male."
song: "High-pitched buzzy song, usually 3-4 notes with the first note being the highest."
cheats: "Cool yellow crown, and actually has a yellow wing like the name suggests!"
