name: Virginia's Warbler
section: Warblers
identification: "Mostly grey with a yellow undertail. Features a thin white eyering. Almost all have a yellow breast except for immatures."
song: "A sweet sounding two or three parted warble."
cheats: "YELLOW BUTT! ...and white eyering."
