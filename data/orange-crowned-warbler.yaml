name: Orange-crowned Warbler
section: Warblers
identification: "Olive-coloured overall with some birds being a little bit more yellow than others. Nothing very distinct about this bird. Very faint line through eye and pale eye arcs. Orange crown may be faint or nonexistent."
song: "Trilling song that starts high-pitched then lowers slightly."
cheats: "Good luck / Orange you glad it's yellow?"
